<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Sole ❤️🌻</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --amarillo-girasol: #FFD700;
    --marron-tierra: #5D4037;
    --blanco-crema: rgba(255, 250, 240, 0.9);
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    /* FONGO DE GIRASOLES REFORZADO */
    background: #2c3e50 url('https://images.unsplash.com/photo-1470252649358-96753a782901?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
    background-size: cover;
    overflow-x: hidden;
    overflow-y: auto;
}

/* PANTALLA INICIAL */
#pantalla-verificacion {
    background: white;
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    text-align: center;
    max-width: 320px;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10000;
    border: 3px solid var(--amarillo-girasol);
}

.titulo-principal {
    font-family: 'Great Vibes', cursive;
    font-size: 45px;
    color: var(--marron-tierra);
    margin-bottom: 10px;
}

.input-fecha {
    margin-top: 15px;
    padding: 12px;
    font-size: 18px;
    border: 2px solid var(--amarillo-girasol);
    border-radius: 12px;
    text-align: center;
    width: 85%;
    outline: none;
}

.btn-verificar {
    margin-top: 20px;
    background: var(--amarillo-girasol);
    color: var(--marron-tierra);
    border: none;
    padding: 12px 30px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 600;
    font-size: 16px;
    transition: transform 0.2s;
}

.btn-verificar:hover { transform: scale(1.05); }

/* CONTENIDO */
#contenido-principal {
    display: none;
    max-width: 750px;
    margin: auto;
    padding: 40px 20px;
    text-align: center;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    color: white;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
    margin-bottom: 30px;
}

.texto-animado {
    font-size: 20px;
    color: #2c3e50;
    line-height: 1.9;
    background: var(--blanco-crema);
    padding: 40px;
    border-radius: 30px;
    border-right: 10px solid var(--amarillo-girasol);
    text-align: left;
    font-style: italic;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    min-height: 200px;
    transition: all 0.5s ease;
}

/* Estilo para las letras que van apareciendo */
.letra {
    animation: fadeIn 0.4s forwards;
    opacity: 0;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

.destacar {
    color: #d35400;
    font-weight: 600;
    text-decoration: underline var(--amarillo-girasol);
}

/* SECCIÓN GATITO ÚNICO */
.contenedor-gatitos {
    display: flex;
    justify-content: center;
    margin: 40px 0;
}

.gif-gatito {
    width: 280px;
    border-radius: 20px;
    border: 6px solid white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* MONITO */
#monito-caminante {
    position: fixed;
    bottom: 20px;
    left: -100px;
    font-size: 55px;
    z-index: 9999;
    pointer-events: none;
    display: none;
}

.heart-particle { position: fixed; pointer-events: none; z-index: 9999; font-size: 20px; }

@keyframes explode {
    0% { transform: translate(0,0) scale(1); opacity:1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity:0; }
}
</style>
</head>

<body>

<div id="pantalla-verificacion">
    <div class="titulo-principal">Para Sole ❤️</div>
    <div style="color: #666; font-size: 14px;">Nuestra Fecha Especial</div>
    <input type="tel" id="fechaInput" class="input-fecha" placeholder="DDMMYYYY" maxlength="8">
    <button class="btn-verificar" onclick="verificarFecha()">Abrir mi corazón 🌻</button>
    <p id="error" style="color:red; display:none; margin-top:10px;">Esa no es la fecha... 🥺</p>
</div>

<div id="contenido-principal">
    <h1>Para Sole, mi monita 🌻❤️</h1>
    
    <div id="textoCarta" class="texto-animado"></div>

    <div class="contenedor-gatitos">
        <img class="gif-gatito" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ3R6bm9qZWh4YXN3bm9ueXp5eG94bm9ueXp5eG94bm9ueXp5eG94JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/MDJ9IbxxvDUQM/giphy.gif" alt="Gatito tierno">
    </div>

    <div style="font-family:'Great Vibes'; font-size:45px; color:white; text-shadow: 2px 2px 8px rgba(0,0,0,0.6); padding-bottom:80px;">
        Eres mi todo. ❤️🌻
    </div>
</div>

<div id="monito-caminante">🐒</div>

<script>
const mensaje = `Cielo, estaba aquí sentado pensando en nosotros y, de verdad, sigo sin asimilar la suerte que tuve. A veces miro a mi alrededor y me parece increíble haberme cruzado con alguien como tú.

No tienes idea de lo mucho que me fascina todo de ti. Amo cada detalle tuyo: tu cabello, tus ojitos o esa sonrisa que me vuelve loco. No pienso soltarte nunca; mi único plan es construir una vida entera contigo.

Ahora mismo te extraño tanto que duele. Me muero por perderme en tus ojos y sentir esa paz que solo tú me transmites. No sabes las ganas que tengo de darte un abrazo eterno y de llenarte la frente de besos. Cuento los minutos para volver a tenerte cerca.`;

function escribirTexto() {
    const cont = document.getElementById("textoCarta");
    let index = 0;

    // Función interna para procesar el texto letra por letra
    function procesar() {
        if (index < mensaje.length) {
            const span = document.createElement("span");
            span.className = "letra";
            span.innerHTML = mensaje[index] === "\n" ? "<br>" : mensaje[index];
            cont.appendChild(span);
            
            index++;
            // Velocidad de escritura: 50ms (más lento y romántico)
            setTimeout(procesar, 50);
        }
    }
    procesar();
}

function verificarFecha() {
    const input = document.getElementById('fechaInput').value;

    if (input === "13032026") {
        document.getElementById('pantalla-verificacion').style.display = "none";
        document.getElementById('contenido-principal').style.display = "block";
        document.getElementById('monito-caminante').style.display = "block";

        escribirTexto();
        iniciarMonito();
    } else {
        document.getElementById('error').style.display = "block";
    }
}

function iniciarMonito() {
    const mono = document.getElementById("monito-caminante");
    let x = -100;
    let vel = 2;

    function animar() {
        x += vel;
        mono.style.left = x + "px";
        if (x > window.innerWidth - 60 || x < -50) {
            vel *= -1;
            mono.style.transform = vel > 0 ? "scaleX(1)" : "scaleX(-1)";
        }
        requestAnimationFrame(animar);
    }
    animar();
}

document.addEventListener("click", function(e){
    for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        p.classList.add('heart-particle');
        p.innerHTML = "🌻"; // Cambié los corazones por girasoles al hacer click
        p.style.left = e.clientX + 'px';
        p.style.top = e.clientY + 'px';
        const tx = (Math.random() - 0.5) * 200;
        const ty = (Math.random() - 0.5) * 200;
        p.style.setProperty('--tx', tx + "px");
        p.style.setProperty('--ty', ty + "px");
        p.style.animation = "explode 0.8s forwards";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
});
</script>

</body>
</html>
