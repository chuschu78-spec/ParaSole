<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Sole ❤️🌻</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --amarillo-girasol: #FFD700; /* Un amarillo brillante y cálido */
    --marron-tierra: #8B4513;   /* Para el texto de contraste */
    --blanco-crema: #FFF8DC;     /* Para las cajas de texto */
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    /* CAMBIO DE FONDO: Imagen de un campo de girasoles de alta calidad */
    background-image: url('https://img.freepik.com/foto-gratis/hermoso-campo-girasoles-al-atardecer_1268-18548.jpg');
    background-size: cover;          /* Asegura que la imagen cubra toda la pantalla */
    background-position: center;    /* Centra la imagen */
    background-attachment: fixed;    /* Mantiene el fondo estático al hacer scroll */
    overflow-x: hidden;
    overflow-y: auto;
}

/* PANTALLA INICIAL */
#pantalla-verificacion {
    background: var(--blanco-crema); /* Fondo de la tarjeta */
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3); /* Sombra más pronunciada */
    text-align: center;
    max-width: 320px;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10000;
}

.titulo-principal {
    font-family: 'Great Vibes', cursive;
    font-size: 40px;
    color: var(--marron-tierra);
}

.pista {
    margin-top: 10px;
    font-size: 15px;
    color: #444; /* Un marrón oscuro para el texto secundario */
}

.input-fecha {
    margin-top: 15px;
    padding: 12px;
    font-size: 18px;
    border: 2px solid var(--amarillo-girasol);
    border-radius: 12px;
    text-align: center;
    width: 80%;
    color: var(--marron-tierra);
    background-color: white; /* Para el input */
}

.btn-verificar {
    margin-top: 15px;
    background: var(--amarillo-girasol);
    color: var(--marron-tierra); /* Texto del botón */
    border: none;
    padding: 10px 25px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: 600;
}

/* CONTENIDO */
#contenido-principal {
    display: none;
    max-width: 700px;
    margin: auto;
    padding: 20px;
    text-align: center;
    min-height: 100vh;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 55px;
    color: white; /* Texto del título en blanco para contraste */
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7); /* Sombra de texto */
    margin-top: 60px;
}

.texto-animado {
    font-size: 19px;
    color: #333; /* Texto principal oscuro */
    line-height: 1.8;
    background: rgba(255, 255, 255, 0.85); /* Fondo blanco con opacidad */
    padding: 30px;
    border-radius: 25px;
    border-left: 8px solid var(--amarillo-girasol);
    text-align: left;
    font-style: italic;
    font-weight: 300;
    margin-bottom: 30px;
}

/* SECCIÓN GATITOS */
.contenedor-gatitos {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 40px;
}

.gif-gatito {
    width: 250px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    border: 4px solid white;
}

/* FRASES DESTACADAS */
.destacar {
    color: var(--marron-tierra);
    font-weight: 600;
    opacity: 0;
    animation: aparecer 1.5s ease forwards;
}

@keyframes aparecer {
    to {
        opacity: 1;
        text-shadow: 0 0 10px rgba(139, 69, 19, 0.5); /* Sombra marrón */
    }
}

/* MONITO */
#monito-caminante {
    position: fixed;
    bottom: 20px;
    left: -100px;
    font-size: 50px;
    z-index: 9999;
    pointer-events: none;
    display: none;
}

/* EXPLOSIÓN CORAZONES */
.heart-particle {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
}

@keyframes explode {
    0% { transform: translate(0,0) scale(1); opacity:1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity:0; }
}
</style>
</head>

<body>

<!-- PANTALLA DE ENTRADA -->
<div id="pantalla-verificacion">
    <div class="titulo-principal">Para Sole ❤️🌻</div>
    <div class="pista">
        <b>Pista:</b> Nuestra Fecha Especial (Día, Mes, Año)
    </div>
    <input type="tel" id="fechaInput" class="input-fecha" placeholder="DDMMYYYY" maxlength="8">
    <button class="btn-verificar" onclick="verificarFecha()">Entrar 💌</button>
    <p id="error" style="color:red; display:none;">Fecha incorrecta... 🥺</p>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div id="contenido-principal">
    <h1>Para Sole, mi monita 🌻❤️</h1>
    
    <div id="textoCarta" class="texto-animado"></div>

    <!-- SECCIÓN DE GATITOS (Reparada) -->
    <div class="contenedor-gatitos">
        <img class="gif-gatito" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ3R6bm9qZWh4YXN3bm9ueXp5eG94bm9ueXp5eG94bm9ueXp5eG94JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/MDJ9IbxxvDUQM/giphy.gif" alt="Gatitos abrazándose">
        <img class="gif-gatito" src="https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUyOTViYWNueDNtbnJuZGpscmc1bzQ1M3k4cXRtNnlnM2thM3p2d2dsaiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/hapksuDhRmbU4/giphy-downsized.gif" alt="Gatitos amor">
    </div>

    <div style="font-family:'Great Vibes'; font-size:40px; color:white; text-shadow: 2px 2px 4px rgba(0,0,0,0.7); padding-bottom:100px;">
        Eres mi todo. ❤️🌻
    </div>
</div>

<div id="monito-caminante">🐒</div>

<script>
// El script permanece igual, no necesita cambios.
const mensaje = `Cielo, estaba aquí sentado pensando en nosotros y, de verdad, sigo sin asimilar la suerte que tuve. A veces miro a mi alrededor y me parece increíble haberme cruzado con alguien como tú; es como si la vida me hubiera dado el regalo más grande del mundo sin que yo hiciera nada para merecerlo.

<span class="destacar">No tienes idea de lo mucho que me fascina todo de ti.</span>

Amo cada detalle tuyo: tu cabello, tus ojitos verdes o esa sonrisa que me vuelve loco. A veces siento que ni tú misma te das cuenta de lo increíble que eres. No pienso soltarte nunca; mi único plan es construir una vida entera contigo, cumpliendo sueños de la mano y estando ahí para ti, en las buenas y en las malas.

<span class="destacar">Ahora mismo te extraño tanto que duele.</span>

Me muero por perderme en tus ojos y sentir esa paz que solo tú me transmites. No sabes las ganas que tengo de darte un abrazo eterno, de esos en los que el mundo se detiene, de llenarte la frente de besos mientras te susurro cuánto te amo y de quedarme perdido en el color de tu sonrisa. Cuento los minutos para volver a tenerte cerca.`;

let i = 0;
function escribirTexto() {
    const cont = document.getElementById("textoCarta");

    if (i < mensaje.length) {
        if (mensaje[i] === "<") {
            const cierre = mensaje.indexOf(">", i);
            cont.innerHTML += mensaje.substring(i, cierre + 1);
            i = cierre + 1;
        } else {
            cont.innerHTML += mensaje[i];
            i++;
        }
        setTimeout(escribirTexto, 25);
    }
}

function verificarFecha() {
    const input = document.getElementById('fechaInput').value;

    if (input === "13032026") {
        document.getElementById('pantalla-verificacion').style.display = "none";
        document.getElementById('contenido-principal').style.display = "block";
        document.getElementById('monito-caminante').style.display = "block";

        escribirTexto();
        iniciarMonito();
    } else {
        document.getElementById('error').style.display = "block";
    }
}

function iniciarMonito() {
    const mono = document.getElementById("monito-caminante");
    let x = -100;
    let vel = 2;

    function animar() {
        x += vel;
        mono.style.left = x + "px";

        if (x > window.innerWidth - 60 || x < -50) {
            vel *= -1;
            mono.style.transform = vel > 0 ? "scaleX(1)" : "scaleX(-1)";
        }

        requestAnimationFrame(animar);
    }
    animar();
}

document.addEventListener("click", function(e){
    for (let i = 0; i < 10; i++) {
        const p = document.createElement('div');
        p.classList.add('heart-particle');
        p.innerHTML = "❤️";
        p.style.left = e.clientX + 'px';
        p.style.top = e.clientY + 'px';
        const tx = (Math.random() - 0.5) * 300;
        const ty = (Math.random() - 0.5) * 300;
        p.style.setProperty('--tx', tx + "px");
        p.style.setProperty('--ty', ty + "px");
        p.style.animation = "explode 1s forwards";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1000);
    }
});
</script>

</body>
</html>
