<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Sole ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosa-claro: #ffe5ec;
            --rosa-fuerte: #ff4d6d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--rosa-claro);
            background-image: url('https://www.transparenttextures.com/patterns/hearts.png');
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 1.5s ease;
        }

        /* Pantalla de Verificación */
        #pantalla-verificacion {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 1000;
            max-width: 320px;
        }

        .input-fecha {
            padding: 12px;
            font-size: 18px;
            border: 2px solid var(--rosa-fuerte);
            border-radius: 12px;
            text-align: center;
            width: 80%;
            outline: none;
        }

        .btn-verificar {
            display: block;
            margin: 20px auto 0;
            background: var(--rosa-fuerte);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Contenedor Principal */
        #contenido-principal {
            display: none;
            max-width: 700px;
            margin: auto;
            padding: 20px;
            text-align: center;
            height: 100vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        #contenido-principal::-webkit-scrollbar { display: none; }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 55px;
            color: var(--rosa-fuerte);
            margin-top: 60px;
        }

        .texto-animado {
            font-size: 19px;
            color: #333;
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 25px;
            border-left: 8px solid var(--rosa-fuerte);
            margin-bottom: 50px;
            text-align: left;
            white-space: pre-wrap;
        }

        /* Emojis Flotantes (Lluvia hacia arriba) */
        .flotante {
            position: fixed;
            bottom: -50px;
            font-size: 24px;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: subir 6s linear forwards;
        }

        @keyframes subir {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* El Monito Caminante */
        #monito {
            position: fixed;
            bottom: 10px;
            left: -100px;
            font-size: 40px;
            z-index: 100;
            transition: transform 0.2s;
            user-select: none;
            pointer-events: none;
        }

        /* Explosión de click */
        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body onclick="explotarCorazones(event)">

    <div id="pantalla-verificacion">
        <h2 style="font-family: 'Great Vibes'; font-size: 38px; color: var(--rosa-fuerte);">Para Sole ❤️</h2>
        <input type="text" id="fechaInput" class="input-fecha" placeholder="DDMMYYYY" maxlength="8">
        <button class="btn-verificar" onclick="verificarFecha()">Entrar al mensaje</button>
        <p id="error" style="color: var(--rosa-fuerte); display: none; margin-top: 15px;">Fecha incorrecta... 🥺</p>
    </div>

    <div id="contenido-principal">
        <h1>Para Sole, mi monita 🌻❤️</h1>
        <div id="textoCarta" class="texto-animado"></div>
        <div style="font-family: 'Great Vibes'; font-size: 40px; color: var(--rosa-fuerte); padding-bottom: 100px;">
            Eres mi todo. ❤️🌻
        </div>
    </div>

    <!-- El Monito -->
    <div id="monito">🐒</div>

    <script>
        const mensaje = `Cielo, estaba aquí sentado pensando en nosotros y, de verdad, sigo sin asimilar la suerte que tuve. A veces miro a mi alrededor y me parece increíble haberme cruzado con alguien como tú.

Amo cada detalle tuyo: tu cabello, tus ojitos verdes o esa sonrisa que me vuelve loco. Quiero que sepas que me he propuesto como meta que algún día te veas a través de mis ojos. Voy a estar ahí para recordarte lo hermosa que eres, porque para mí eres perfecta tal cual eres.

No pienso soltarte nunca; mi único plan es construir una vida entera contigo. Te extraño tanto que duele. Me muero por sentir esa paz que solo tú me transmites.

Cuento los minutos para volver a tenerte cerca. ❤️🌻`;

        function verificarFecha() {
            const input = document.getElementById('fechaInput').value;
            if (input === "13032026") {
                document.getElementById('pantalla-verificacion').style.display = "none";
                document.getElementById('contenido-principal').style.display = "block";
                escribirTexto();
                iniciarFlotantes();
                caminarMonito();
            } else {
                document.getElementById('error').style.display = "block";
            }
        }

        // Escritura
        let i = 0;
        function escribirTexto() {
            if (i < mensaje.length) {
                document.getElementById("textoCarta").innerHTML += mensaje.charAt(i);
                i++;
                setTimeout(escribirTexto, 45);
            }
        }

        // Emojis Flotantes (Solo corazones y girasoles)
        function iniciarFlotantes() {
            const emojis = ["❤️", "🌻", "💖", "✨"];
            setInterval(() => {
                const e = document.createElement("div");
                e.classList.add("flotante");
                e.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                e.style.left = Math.random() * 100 + "vw";
                e.style.fontSize = (Math.random() * 20 + 20) + "px";
                document.body.appendChild(e);
                setTimeout(() => e.remove(), 6000);
            }, 600);
        }

        // Lógica del Monito Caminante
        function caminarMonito() {
            const monito = document.getElementById("monito");
            let pos = -100;
            let direccion = 1; // 1 derecha, -1 izquierda

            setInterval(() => {
                pos += (2 * direccion);
                monito.style.left = pos + "px";

                // Si llega al final de la pantalla, da la vuelta
                if (pos > window.innerWidth) {
                    direccion = -1;
                    monito.style.transform = "scaleX(-1)"; // Gira el emoji
                } else if (pos < -100) {
                    direccion = 1;
                    monito.style.transform = "scaleX(1)";
                }
            }, 50);
        }

        // Explosión de click
        function explotarCorazones(e) {
            const emojis = ["❤️", "🌻", "💖"];
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.classList.add('heart-particle');
                p.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                p.style.left = e.clientX + 'px';
                p.style.top = e.clientY + 'px';
                const tx = (Math.random() - 0.5) * 300;
                const ty = (Math.random() - 0.5) * 300;
                p.style.setProperty('--tx', `${tx}px`);
                p.style.setProperty('--ty', `${ty}px`);
                p.style.animation = `explode 1s forwards`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }
    </script>
</body>
</html>
